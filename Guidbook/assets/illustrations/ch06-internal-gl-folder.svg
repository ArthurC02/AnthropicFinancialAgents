<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" role="img" aria-labelledby="title desc">
  <title id="title">mock-mcp/internal-gl 資料夾結構</title>
  <desc id="desc">mock-mcp/internal-gl 包含 FastMCP server.py、data 目錄中的 trial_balance、journal_entries、gl_positions 三份 CSV，以及記錄工具清單、欄位說明與測試雷的 README。</desc>
  <defs>
    <style>
      .bg{fill:#faf2e4}
      .ink{fill:none;stroke:#2e2c28;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke-width:2}
      .txt{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#2e2c28;font-size:17px;font-weight:700}
      .small{font-size:12.5px;font-weight:500}
      .tiny{font-size:11px;font-weight:500}
      .label{fill:#c15f3c}
      .center{text-anchor:middle}
      .card{fill:#fbf5e7;stroke:#2e2c28}
      .blue{fill:#e2eef4;stroke:#2c7a9e}
      .green{fill:#e5efe5;stroke:#4c7a4c}
      .amber{fill:#f6ecd9;stroke:#a3712a}
      .red{fill:#f7e3e1;stroke:#b3382f}
    </style>
  </defs>
  <rect class="bg" width="880" height="430" rx="20"/>
  <text class="txt label" x="42" y="42">mock-mcp/internal-gl：一個最小可跑的 MCP server</text>

  <rect class="card" x="42" y="78" width="796" height="294" rx="22"/>
  <text class="txt" x="76" y="112">mock-mcp/internal-gl/</text>
  <text class="txt small label" x="76" y="134">三個檔案/資料夾各自負責：server、假資料、文件</text>

  <rect class="blue" x="72" y="166" width="208" height="116" rx="16"/>
  <text class="txt center" x="176" y="198">server.py</text>
  <text class="txt tiny center" x="176" y="222">FastMCP server 本體</text>
  <text class="txt tiny center" x="176" y="241">定義唯讀 @mcp.tool()</text>
  <text class="txt tiny center" x="176" y="260">預設 stdio，可開 HTTP</text>

  <rect class="green" x="336" y="148" width="224" height="154" rx="16"/>
  <text class="txt center" x="448" y="178">data/</text>
  <rect class="card" x="362" y="190" width="172" height="28" rx="8"/>
  <text class="txt tiny center" x="448" y="209">trial_balance.csv</text>
  <rect class="card" x="362" y="226" width="172" height="28" rx="8"/>
  <text class="txt tiny center" x="448" y="245">journal_entries.csv</text>
  <rect class="card" x="362" y="262" width="172" height="28" rx="8"/>
  <text class="txt tiny center" x="448" y="281">gl_positions.csv</text>

  <rect class="amber" x="616" y="166" width="190" height="116" rx="16"/>
  <text class="txt center" x="711" y="198">README.md</text>
  <text class="txt tiny center" x="711" y="222">工具清單</text>
  <text class="txt tiny center" x="711" y="241">欄位說明</text>
  <text class="txt tiny center" x="711" y="260">埋的測試雷</text>

  <path class="ink" d="M280 224 H336"/>
  <path class="ink" d="M318 211 L336 224 L318 237"/>
  <text class="txt tiny label center" x="308" y="206">讀 CSV</text>

  <path class="ink" d="M560 224 H616"/>
  <path class="ink" d="M598 211 L616 224 L598 237"/>
  <text class="txt tiny label center" x="588" y="206">對照文件</text>

  <rect class="red" x="170" y="318" width="540" height="44" rx="14"/>
  <text class="txt small label center" x="440" y="346">重點：mock server 不寫帳，只用固定 CSV 提供可重現測試資料</text>
</svg>
